<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Clínica Premium - ODENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/historia_clinica.css">
</head>
<body class="p-4 md:p-10" onclick="cerrarSelector(event)">

    <div class="max-w-5xl mx-auto">
        
        <header class="bg-slate-900 text-white rounded-[32px] p-8 mb-8 shadow-2xl border-b-8 border-sky-500 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-sky-500/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 relative z-10">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-sky-400 to-sky-600 rounded-3xl flex items-center justify-center text-3xl font-black italic shadow-xl shadow-sky-500/20">OD</div>
                    <div>
                        <h1 id="p-full-name" class="text-3xl font-black uppercase tracking-tighter italic text-sky-400">Cargando Paciente...</h1>
                        <span id="p-especialidad" class="text-[10px] font-black text-slate-400 bg-white/10 px-4 py-1.5 rounded-full uppercase border border-white/10 tracking-widest">Historial Clínico Digital</span>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-2xl font-bold text-[11px] uppercase transition-all border border-slate-700">Imprimir</button>
                    <button onclick="guardarTodo()" class="bg-sky-500 hover:bg-sky-400 px-10 py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-sky-500/30 transition-all transform hover:scale-105">Finalizar Consulta</button>
                </div>
            </div>

            <div class="user-data-grid border-t border-slate-800/50 pt-8 relative z-10">
                <div class="flex flex-col"><span class="data-label">Identificación</span><span id="p-doc" class="data-value">--</span></div>
                <div class="flex flex-col"><span class="data-label">Contacto</span><span id="p-tel" class="data-value">--</span></div>
                <div class="flex flex-col"><span class="data-label">Email</span><span id="p-email" class="data-value text-slate-400">--</span></div>
                <div class="flex flex-col"><span class="data-label">Residencia</span><span id="p-dir" class="data-value text-slate-400">--</span></div>
            </div>
        </header>

        <section class="section-card" tabindex="0">
            <h3 class="header-label"><i class="fas fa-comment-medical"></i> 1. Motivo de la Cita</h3>
            <textarea id="hc-motivo" class="input-clinical h-20 resize-none" placeholder="¿Cuál es la razón principal de la visita hoy?"></textarea>
        </section>

        <section class="section-card hidden-section">
            <h3 class="header-label">Antecedentes</h3>
        </section>

        <section class="section-card" tabindex="0">
            <h3 class="header-label"><i class="fas fa-tooth"></i> 2. Examen y Mapa Dental</h3>
            
            <div class="bg-slate-50 p-8 rounded-[32px] mb-8 border border-slate-200/50 relative">
                <div class="flex flex-col gap-8">
                    <div class="flex justify-center gap-3 flex-wrap" id="odo-sup"></div>
                    <div class="w-full h-px bg-gradient-to-r from-transparent via-slate-300 to-transparent"></div>
                    <div class="flex justify-center gap-3 flex-wrap" id="odo-inf"></div>
                </div>

                <div id="selector-estado" onclick="event.stopPropagation()">
                    <span class="text-[10px] font-black uppercase text-slate-400 block mb-3 px-1">Diente <span id="num-diente-sel" class="text-sky-500">--</span></span>
                    <button onclick="asignarEstado('azul')" class="w-full text-left p-2.5 hover:bg-sky-50 rounded-xl text-[11px] font-bold text-sky-600 mb-1 flex items-center gap-3"><div class="w-2.5 h-2.5 bg-sky-500 rounded-full"></div> Tratamiento</button>
                    <button onclick="asignarEstado('rojo')" class="w-full text-left p-2.5 hover:bg-red-50 rounded-xl text-[11px] font-bold text-red-600 mb-1 flex items-center gap-3"><div class="w-2.5 h-2.5 bg-red-500 rounded-full"></div> Daño / Caries</button>
                    <button onclick="asignarEstado('verde')" class="w-full text-left p-2.5 hover:bg-green-50 rounded-xl text-[11px] font-bold text-green-600 mb-1 flex items-center gap-3"><div class="w-2.5 h-2.5 bg-green-500 rounded-full"></div> Sano / Listo</button>
                    <button onclick="asignarEstado('')" class="w-full text-left p-2.5 hover:bg-slate-100 rounded-xl text-[11px] font-bold text-slate-500 flex items-center gap-3"><div class="w-2.5 h-2.5 border-2 border-slate-300 rounded-full"></div> Limpiar</button>
                </div>
            </div>

            <div class="bg-sky-50/50 p-6 rounded-3xl border border-sky-100">
                <span class="text-[10px] font-black text-sky-600 uppercase mb-4 block tracking-widest">Observaciones y Hallazgos</span>
                <div class="space-y-4" id="lista-hallazgos">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                        <div class="md:col-span-1">
                            <select class="select-odont">
                                <option value="">-- Procedimiento --</option>
                                <option>Caries Detectada</option>
                                <option>Ausente / Perdido</option>
                                <option>Cirugía Pendiente</option>
                                <option>Endodoncia</option>
                                <option>Limpieza Profunda</option>
                                <option>Otro...</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <input type="text" class="input-clinical" placeholder="Detalles específicos para el odontólogo...">
                        </div>
                    </div>
                </div>
                <button onclick="agregarFila()" class="mt-6 text-[11px] font-black text-sky-500 hover:text-sky-700 uppercase flex items-center gap-2 transition-all hover:translate-x-1">
                    <i class="fas fa-plus-circle text-lg"></i> Añadir Hallazgo adicional
                </button>
            </div>
        </section>

        <section class="section-card" tabindex="0">
            <h3 class="header-label"><i class="fas fa-clipboard-check"></i> 3. Evolución Clínica</h3>
            <textarea id="hc-evolucion" class="input-clinical h-36 resize-none" placeholder="Escriba aquí los avances y procedimientos realizados en esta sesión..."></textarea>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Diagnóstico</span>
                    <input type="text" id="hc-diag" class="input-clinical" placeholder="Conclusión médica">
                </div>
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Plan a seguir</span>
                    <input type="text" id="hc-plan" class="input-clinical" placeholder="Próxima cita / Medicinas">
                </div>
            </div>
        </section>

    </div>

<script src="../js/historia_clinica.js"></script>
</body>
</html>
