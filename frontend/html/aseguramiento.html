<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aseguramiento de Datos | Clínica Odontológica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="../css/aseguramiento.css">
</head>
<body class="bg-slate-100 font-sans antialiased p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden flex flex-col">
        
        <!-- HEADER -->
        <header class="bg-gradient-to-br from-blue-700 to-indigo-900 p-6 text-white text-center shadow-lg">
            <h1 class="text-2xl font-extrabold tracking-tight italic">
                <i class="fas fa-user-shield mr-2"></i>Sistema de Aseguramiento de Datos
            </h1>
        </header>

        <main class="p-6 md:p-10">
            <!-- SECCIÓN ÚNICA DE INFORMACIÓN DEL PACIENTE -->
            <section class="space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="flex items-center justify-center w-8 h-8 bg-blue-700 text-white text-sm font-bold rounded-full shadow-md">1</span>
                    <h2 class="text-lg font-bold text-gray-700 border-b-2 border-blue-100 flex-grow pb-1">Información del Paciente</h2>
                </div>

                <div class="bg-gray-50 p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <!-- GRID DE DOS COLUMNAS TODO INTEGRADO -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6">
                        
                        <!-- 1. Nombre Completo -->
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-bold text-black uppercase ml-1">1. Nombre Completo</label>
                            <input type="text" id="nombre" placeholder="Ingrese su nombre completo" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <p id="err-nombre" class="error-text"></p>
                        </div>

                        <!-- 2. Tipo de Documento -->
                        <div>
                            <label class="text-[10px] font-bold text-black uppercase ml-1">2. Tipo de Documento</label>
                            <select id="tipo-doc" required class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                                <option value="" disabled selected>Seleccione la opción de documento</option>
                                <option>Cédula de ciudadanía</option>
                                <option>Tarjeta de identidad</option>
                                <option>Registro civil</option>
                                <option>Cédula de extranjería</option>
                                <option>Permiso especial de permanencia</option>
                            </select>
                            <p id="err-tipo-doc" class="error-text"></p>
                        </div>

                        <!-- 3. Número de Documento -->
                        <div>
                            <label class="text-[10px] font-bold text-black uppercase ml-1">3. Número de Documento</label>
                            <input type="text" id="num-doc" placeholder="Ingrese su número de documento" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <p id="err-documento" class="error-text"></p>
                        </div>

                        <!-- 4. Teléfono -->
                        <div>
                            <label class="text-[10px] font-bold text-black uppercase ml-1">4. Teléfono</label>
                            <input type="text" id="telefono" placeholder="Ingrese su número de teléfono" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <p id="err-telefono" class="error-text"></p>
                        </div>

                        <!-- 5. Correo Electrónico -->
                        <div>
                            <label class="text-[10px] font-bold text-black uppercase ml-1">5. Correo Electrónico</label>
                            <input type="email" id="correo" placeholder="Ingrese su correo electrónico" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <p id="err-correo" class="error-text"></p>
                        </div>

                        <!-- 6. Dirección de Residencia -->
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-bold text-black uppercase ml-1">6. Dirección de Residencia</label>
                            <input type="text" id="direccion" placeholder="Ingrese su dirección de residencia" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <p id="err-direccion" class="error-text"></p>
                        </div>
                    </div>

                    <!-- Aceptación de Términos -->
                    <div class="mt-8 pt-6 border-t border-gray-200">
                        <div class="flex items-start gap-3 bg-white p-4 rounded-2xl border border-gray-100 max-w-2xl mx-auto">
                            <input type="checkbox" id="terminos" class="mt-1 w-4 h-4 text-blue-700 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                            <label for="terminos" class="text-[11px] text-gray-500 leading-tight">
                                Autorizo el tratamiento de mis datos personales y acepto los términos de <span class="text-blue-700 font-bold underline cursor-pointer">Habeas Data</span> para el aseguramiento de mi información clínica.
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- BOTONES DE ACCIÓN -->
            <div class="mt-12 flex flex-col md:flex-row justify-center gap-4">
                <button onclick="validarYProcesar('asegurar')" class="w-full md:w-1/3 bg-blue-700 hover:bg-blue-800 text-white font-extrabold py-5 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3">
                    <i class="fas fa-lock"></i> ASEGURAR DATOS
                </button>
                <button onclick="validarYProcesar('actualizar')" class="w-full md:w-1/3 bg-white border-2 border-blue-700 text-blue-700 hover:bg-blue-50 font-extrabold py-5 rounded-2xl shadow-md transition-all transform active:scale-95 flex items-center justify-center gap-3">
                    <i class="fas fa-sync-alt"></i> ACTUALIZAR DATOS
                </button>

                <a href="administrador.html" class="w-full md:w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-extrabold py-5 rounded-2xl shadow-md transition-all transform active:scale-95 flex items-center justify-center gap-3 text-center no-underline">
                    <i class="fas fa-arrow-left"></i> VOLVER AL PANEL
                </a>
            </div>
        </main>

        <footer class="p-6 text-center bg-gray-50 border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Consultorio Odontológico Digital • Seguridad Nivel Salud</p>
        </footer>
    </div>

<script src="../js/aseguramiento.js"></script>

</body>
</html>
