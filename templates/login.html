<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Dental</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <h2>Iniciar Sesión</h2>
        <p>Usa tus credenciales de registro</p>
    </div>

    <div class="body">

        <form id="loginForm">

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-password-wrap">
                    <input type="password" id="contrasena" placeholder="****" required>
                    <div class="toggle-password" onclick="togglePassword('contrasena')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                </div>
            </div>

            <p id="loginError" class="error-msg"></p>

            <button type="submit">
                Entrar al Sistema
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>

        </form>

        <div class="footer-link">
            ¿Aún no tienes cuenta? <a href="/creacion.html">Regístrate aquí</a>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
