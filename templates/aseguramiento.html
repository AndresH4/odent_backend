<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aseguramiento de Datos | Stylo Dental</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/creacion.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/aseguramiento.css') }}">
</head>
<body>
 
<div class="container">
    <div class="header">
        <div class="header-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <h2>Aseguramiento de Datos</h2>
        <p>Registro de información y su afiliación a EPS</p>
    </div>
 
    <div class="body">
 
        <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Información General
        </div>
 
        <div class="form-row">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ingrese el nombre completo">
                <div class="error-msg" id="err-nombre"></div>
            </div>
            <div class="form-group">
                <label>Tipo de documento</label>
                <select id="tipo-doc" required>
                    <option value="" disabled selected>Seleccione el tipo de documento</option>
                    <option>Cedula de ciudadanía</option>
                    <option>Tarjeta de identidad</option>
                    <option>Registro civil</option>
                    <option>Cedula de extranjería</option>
                    <option>Permiso especial de permanencia</option>
                </select>
                <div class="error-msg" id="err-tipo-doc"></div>
            </div>
        </div>
 
        <div class="form-row">
            <div class="form-group">
                <label>Número de documento</label>
                <input type="text" id="num-doc" maxlength="10" placeholder="Ingrese el número de documento">
                <div class="error-msg" id="err-documento"></div>
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" id="telefono" maxlength="10" placeholder="Ingrese el número de teléfono">
                <div class="error-msg" id="err-telefono"></div>
            </div>
        </div>
 
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="correo" placeholder="correo@ejemplo.com">
            <div class="error-msg" id="err-correo"></div>
        </div>
 
        <div class="seccion-medica" style="display:block;">
            <div class="seccion-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Datos de Aseguramiento
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de EPS</label>
                    <select id="tipo-eps-select">
                        <option value="" disabled selected>Seleccione el tipo de EPS</option>
                    </select>
                    <div class="error-msg" id="err-tipo-eps"></div>
                </div>
                <div class="form-group">
                    <label>EPS</label>
                    <select id="eps-select">
                        <option value="" disabled selected>Seleccione la EPS</option>
                    </select>
                    <div class="error-msg" id="err-eps"></div>
                </div>
            </div>
 
            <div id="eps-otro-container" style="display:none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre de la nueva EPS</label>
                        <input type="text" id="eps-otro-nombre" placeholder="Ingrese el nombre de la EPS">
                        <div class="error-msg" id="err-eps-otro-nombre"></div>
                    </div>
                    <div class="form-group">
                        <label>Teléfono de la nueva EPS</label>
                        <input type="text" id="eps-otro-telefono" placeholder="Ej. 601 1234567">
                        <div class="error-msg" id="err-eps-otro-telefono"></div>
                    </div>
                </div>
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label>Régimen</label>
                    <select id="regimen-select">
                        <option value="" disabled selected>Seleccione el régimen</option>
                    </select>
                    <div class="error-msg" id="err-regimen"></div>
                </div>
            </div>
        </div>
 
        <div class="form-group" style="margin-top: 8px; border-top: 1.5px solid #e0f2fe; padding-top: 18px;">
            <label style="display:flex; align-items:flex-start; gap:8px; font-weight:500; color:#475569; font-size: 11.5px; line-height:1.5;">
                <input type="checkbox" id="terminos" style="margin-top:2px; width:16px; height:16px; flex-shrink:0;">
                Autorizo el tratamiento de los datos personales del paciente y acepto los términos de Habeas Data para el aseguramiento de su información clínica.
            </label>
        </div>
 
        <div id="mensaje-global" style="display:none; color: #dc2626; font-size: 13px; margin-top: 10px; text-align: center; font-weight: 500;"></div>
 
        <div class="form-row" style="margin-top: 8px;">
            <button onclick="validarYProcesar('asegurar')" class="btn-accion">
                Asegurar Datos
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </button>
            <button onclick="validarYProcesar('actualizar')" class="btn-accion" style="background: linear-gradient(135deg, #64748b, #94a3b8);">
                Actualizar Datos
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </button>
        </div>
 
        <a href="administrador.html" style="display:block; text-align:center; margin-top:14px; font-size:13px; color:#64748b; text-decoration:none; font-weight:600;">
            &#8592; Volver al panel
        </a>
 
    </div>
</div>
 
<script src="{{ url_for('static', filename='js/aseguramiento.js') }}"></script>
</body>
</html>
